name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      postgres_tag:
        description: "Custom Postgres image tag (e.g., add-new-feature)"
        required: false
        default: "18"
        type: string

env:
  GO_VERSION: "1.26.2"

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      go: ${{ steps.filter.outputs.go }}
      go-core: ${{ steps.filter.outputs.go-core }}
      go-areas: ${{ steps.go-areas.outputs.areas }}
      admin-ui: ${{ steps.filter.outputs.admin-ui }}
      sdk: ${{ steps.filter.outputs.sdk }}
      e2e-ui: ${{ steps.filter.outputs.e2e-ui }}
      docker: ${{ steps.filter.outputs.docker }}
      ci-config: ${{ steps.filter.outputs.ci-config }}
      code-any: ${{ steps.filter.outputs.code-any }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            go:
              - '**.go'
              - 'go.mod'
              - 'go.sum'
              - 'internal/**'
              - 'cmd/**'
              - 'cli/**'
              - 'seeds/**'
              - 'scripts/**'
              - 'Makefile'
              - 'lefthook.yml'
              - '.testcoverage.yml'
              - '.golangci.yml'
            go-core:
              - 'internal/config/**'
              - 'internal/database/**'
              - 'internal/auth/**'
              - 'internal/middleware/**'
              - 'go.mod'
              - 'go.sum'
            admin-ui:
              - 'admin/src/**'
              - 'admin/public/**'
              - 'admin/index.html'
              - 'admin/package.json'
              - 'admin/vite.config.ts'
              - 'admin/tsconfig*.json'
              - 'admin/components.json'
              - 'admin/eslint.config.js'
              - 'package.json'
              - 'bun.lock'
            sdk:
              - 'sdk/src/**'
              - 'sdk/package.json'
              - 'sdk/tsup.config.ts'
              - 'sdk/tsconfig.json'
              - 'sdk/vitest.config.ts'
              - 'sdk/scripts/**'
              - 'sdk-react/src/**'
              - 'sdk-react/package.json'
              - 'sdk-react/tsup.config.ts'
              - 'sdk-react/tsconfig.json'
              - 'package.json'
              - 'bun.lock'
            e2e-ui:
              - 'admin/tests/**'
              - 'admin/playwright.config.ts'
              - 'admin/global-setup.ts'
              - 'admin/global-teardown.ts'
            docker:
              - 'Dockerfile'
              - 'Dockerfile.docs'
              - 'docker-compose.yml'
              - '.dockerignore'
            ci-config:
              - '.github/workflows/**'
              - '.github/actions/**'
            code-any:
              - '**.go'
              - 'go.mod'
              - 'go.sum'
              - 'internal/**'
              - 'cmd/**'
              - 'cli/**'
              - 'admin/src/**'
              - 'admin/public/**'
              - 'admin/index.html'
              - 'admin/package.json'
              - 'admin/vite.config.ts'
              - 'admin/tests/**'
              - 'admin/playwright.config.ts'
              - 'sdk/src/**'
              - 'sdk/package.json'
              - 'sdk/scripts/**'
              - 'sdk-react/src/**'
              - 'sdk-react/package.json'
              - 'package.json'
              - 'bun.lock'
              - 'Dockerfile'
              - 'Dockerfile.docs'
              - 'Makefile'
              - 'scripts/**'
              - 'seeds/**'

      - name: Detect changed Go areas
        id: go-areas
        if: steps.filter.outputs.go == 'true'
        run: |
          # If core packages changed, test everything
          if [ "${{ steps.filter.outputs.go-core }}" = "true" ]; then
            echo "areas=all" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # List changed internal modules
          AREAS=$(git diff --name-only origin/main...HEAD -- 'internal/**/*.go' 'cmd/**/*.go' 'cli/**/*.go' | \
            grep -oP 'internal/\K[^/]+|cmd|cli' | sort -u | tr '\n' ',' | sed 's/,$//')
          echo "areas=${AREAS:-all}" >> "$GITHUB_OUTPUT"

  lint-go:
    name: Lint Go
    needs: changes
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.go == 'true' ||
      needs.changes.outputs.ci-config == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips-dev libtesseract-dev libleptonica-dev

      - name: Get dependencies
        run: |
          go mod download
          go mod verify

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Set up Node.js for embedded SDK generation
        uses: actions/setup-node@v6
        with:
          node-version: "24.14.1"

      - name: Generate embedded SDK for Jobs runtime
        run: |
          cd sdk
          bun install --frozen-lockfile
          bun run generate:embedded-sdk

      - name: Create dist directory with placeholder for embed directive
        run: |
          mkdir -p internal/adminui/dist
          echo '<!DOCTYPE html><html><head><title>Placeholder</title></head><body></body></html>' > internal/adminui/dist/index.html

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.10.0

      - name: Run golangci-lint
        run: golangci-lint run --timeout 10m ./internal/... ./cmd/... ./cli/...

      - name: Install gofumpt
        run: go install mvdan.cc/gofumpt@latest

      - name: Install lefthook
        run: go install github.com/evilmartians/lefthook@latest

      - name: Check Go formatting with gofumpt
        run: |
          if [ "$(gofumpt -l . | wc -l)" -gt 0 ]; then
            echo "Please run 'make fmt' or 'gofumpt -w .'"
            gofumpt -l .
            exit 1
          fi

      - name: Run pre-commit checks with lefthook
        run: lefthook run pre-commit

  lint-typescript:
    name: Lint TypeScript
    needs: changes
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.admin-ui == 'true' ||
      needs.changes.outputs.ci-config == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.14.1"

      - name: Install dependencies (workspace)
        run: bun install --frozen-lockfile

      - name: Lint Admin
        working-directory: ./admin
        run: bun run lint

  test-sdk:
    name: Test SDK
    needs: changes
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.sdk == 'true' ||
      needs.changes.outputs.admin-ui == 'true' ||
      needs.changes.outputs.ci-config == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.14.1"

      - name: Install dependencies (workspace)
        run: bun install --frozen-lockfile

      - name: Verify test file content (debug)
        working-directory: ./sdk
        run: |
          echo "Checking constructor mock syntax in client.test.ts:"
          grep -A2 "vi.mock.*fetch" src/client.test.ts | head -5

      - name: Run SDK tests with coverage
        working-directory: ./sdk
        run: bun run test:ci

      # - name: Upload SDK coverage to Codecov
      #   uses: codecov/codecov-action@v5
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}
      #     files: ./sdk/coverage/coverage-final.json
      #     flags: sdk
      #     name: sdk-coverage
      #     fail_ci_if_error: true
      #     verbose: true
      #     slug: nimbleflux/fluxbase

      - name: Type check SDK
        working-directory: ./sdk
        run: bun run type-check

      - name: Build SDK
        working-directory: ./sdk
        run: bun run build

      - name: Type check SDK-React
        working-directory: ./sdk-react
        run: bun run type-check

      - name: Build SDK-React
        working-directory: ./sdk-react
        run: bun run build

      - name: Type check Admin
        working-directory: ./admin
        run: bun run type-check

  test-go:
    name: Test Go
    needs: changes
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.go == 'true' ||
      needs.changes.outputs.ci-config == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: ghcr.io/nimbleflux/fluxbase-postgres:${{ inputs.postgres_tag || '18' }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fluxbase_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
        # Configure PostgreSQL with custom settings
        # Note: In GitHub Actions, we need to use a workaround to pass postgres args
        # We'll do this via a step that restarts postgres after configuration

      mailhog:
        image: mailhog/mailhog:latest
        ports:
          - 1025:1025 # SMTP
          - 8025:8025 # Web UI

      minio:
        image: minio/minio:edge-cicd
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
        options: >-
          --health-cmd "curl --silent --fail http://localhost:9000/minio/health/live || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips-dev libtesseract-dev libleptonica-dev

      - name: Get dependencies
        run: |
          go mod download
          go mod verify

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Set up Node.js for embedded SDK generation
        uses: actions/setup-node@v6
        with:
          node-version: "24.14.1"

      - name: Generate embedded SDK for Jobs runtime
        run: |
          cd sdk
          bun install --frozen-lockfile
          bun run generate:embedded-sdk

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.11

      - name: Create dist directory with placeholder for embed directive
        run: |
          mkdir -p internal/adminui/dist
          echo '<!DOCTYPE html><html><head><title>Placeholder</title></head><body></body></html>' > internal/adminui/dist/index.html

      - name: Increase PostgreSQL max_connections
        env:
          PGPASSWORD: postgres
        run: |
          # Default max_connections=100 is too low for test connection pools.
          # The e2e tests create multiple pools (main, superuser, RLS) that
          # together consume ~12+ connections, and the server's internal pools
          # add more. Increase to 200 to prevent connection exhaustion.
          psql -h localhost -U postgres -d fluxbase_test -c "ALTER SYSTEM SET max_connections = 200;"
          PG_CONTAINER=$(docker ps --format '{{.ID}}' --filter "publish=5432")
          if [ -n "$PG_CONTAINER" ]; then
            docker restart "$PG_CONTAINER"
            sleep 5
            # Wait for postgres to be ready after restart
            for i in $(seq 1 30); do
              if psql -h localhost -U postgres -d fluxbase_test -c "SELECT 1" > /dev/null 2>&1; then
                echo "PostgreSQL ready with max_connections=200"
                break
              fi
              sleep 1
            done
          fi

      - name: Setup database users
        env:
          PGPASSWORD: postgres
        run: |
          # Create fluxbase_app user with BYPASSRLS for migrations and general testing
          # This user can bypass RLS policies to manage data freely (like in production)
          # Note: No CONNECTION LIMIT to allow tests to create many concurrent connections
          # CREATEROLE is needed for migrations that create database roles (anon, authenticated, service_role)
          psql -h localhost -U postgres -d fluxbase_test -c "CREATE USER fluxbase_app WITH PASSWORD 'fluxbase_app_password' LOGIN BYPASSRLS CREATEDB CREATEROLE;"
          psql -h localhost -U postgres -d fluxbase_test -c "GRANT ALL PRIVILEGES ON DATABASE fluxbase_test TO fluxbase_app;"

          # Grant schema permissions to fluxbase_app for migrations
          psql -h localhost -U postgres -d fluxbase_test -c "GRANT ALL ON SCHEMA public TO fluxbase_app;"

          # Create _fluxbase schema if it doesn't exist and grant permissions
          psql -h localhost -U postgres -d fluxbase_test -c "CREATE SCHEMA IF NOT EXISTS _fluxbase;"
          psql -h localhost -U postgres -d fluxbase_test -c "GRANT ALL ON SCHEMA _fluxbase TO fluxbase_app;"

          # Create fluxbase_rls_test user specifically for RLS policy testing (without BYPASSRLS)
          # This user is ONLY used in RLS-specific tests to verify policies work correctly
          psql -h localhost -U postgres -d fluxbase_test -c "CREATE USER fluxbase_rls_test WITH PASSWORD 'fluxbase_rls_test_password' LOGIN NOBYPASSRLS CREATEDB;"
          psql -h localhost -U postgres -d fluxbase_test -c "GRANT ALL PRIVILEGES ON DATABASE fluxbase_test TO fluxbase_rls_test;"

          # Enable pgvector extension for AI/RAG features
          psql -h localhost -U postgres -d fluxbase_test -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Setup database schema
        env:
          PGPASSWORD: postgres
        run: |
          # Run bootstrap SQL (creates schemas, extensions, roles, default privileges)
          # Substitute {{APP_USER}} with fluxbase_app (Go runtime does this via SubstituteAppUser)
          sed "s/{{APP_USER}}/fluxbase_app/g" internal/database/bootstrap/bootstrap.sql | psql -h localhost -U postgres -d fluxbase_test -v ON_ERROR_STOP=1

          # Grant role memberships for SET ROLE support
          psql -h localhost -U postgres -d fluxbase_test -c "GRANT anon, authenticated, service_role, tenant_service TO fluxbase_app, fluxbase_rls_test;"

          # Grant fluxbase_app additional privileges for admin operations
          psql -h localhost -U postgres -d fluxbase_test -c "GRANT ALL ON DATABASE fluxbase_test TO fluxbase_app;"
          psql -h localhost -U postgres -d fluxbase_test -c "GRANT ALL ON SCHEMA public TO fluxbase_app;"

      - name: Apply declarative schema
        env:
          PGPASSWORD: postgres
        run: |
          # Apply each schema file in dependency order using psql.
          # All schema files use CREATE TABLE IF NOT EXISTS so they are idempotent.
          # Bootstrap must have already run (creates schemas, extensions, roles).
          SCHEMA_DIR="internal/database/schema/schemas"
          for schema in platform auth storage jobs functions realtime ai rpc system migrations app api branching logging mcp; do
            echo "Applying schema: $schema"
            sed "s/{{APP_USER}}/fluxbase_app/g" "${SCHEMA_DIR}/${schema}.sql" | psql -h localhost -U postgres -d fluxbase_test -v ON_ERROR_STOP=1
          done

          # Apply cross-schema foreign keys (idempotent DO blocks)
          echo "Applying cross-schema foreign keys..."
          psql -h localhost -U postgres -d fluxbase_test -v ON_ERROR_STOP=1 -f "${SCHEMA_DIR}/post-schema-fks.sql"

          # Apply cross-schema policies (safe on fresh database)
          echo "Applying cross-schema policies..."
          psql -h localhost -U postgres -d fluxbase_test -v ON_ERROR_STOP=1 -f "${SCHEMA_DIR}/post-schema.sql"

      - name: Setup MinIO bucket
        run: |
          # Wait for MinIO to be ready
          timeout 30 bash -c 'until curl -f http://localhost:9000/minio/health/live; do sleep 1; done'

          # Install mc (MinIO client)
          wget https://dl.min.io/client/mc/release/linux-amd64/mc
          chmod +x mc

          # Configure mc
          ./mc alias set minio http://localhost:9000 minioadmin minioadmin

          # Create test bucket
          ./mc mb minio/fluxbase-test || true
          ./mc anonymous set public minio/fluxbase-test

      - name: Start Dex OIDC provider
        run: |
          docker run -d --name dex \
            -p 5556:5556 \
            -v "$(pwd)/test/e2e/dex-config-ci.yaml:/etc/dex/config.yaml:ro" \
            ghcr.io/dexidp/dex:latest \
            dex serve /etc/dex/config.yaml
          # Wait for Dex to be healthy
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5556/dex/healthz > /dev/null 2>&1; then
              echo "Dex is ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Dex failed to start"
              docker logs dex
              exit 1
            fi
            sleep 1
          done

      - name: Run unit tests with coverage
        timeout-minutes: 20
        env:
          FLUXBASE_DATABASE_HOST: localhost
          FLUXBASE_DATABASE_PORT: 5432
          FLUXBASE_DATABASE_USER: fluxbase_app
          FLUXBASE_DATABASE_PASSWORD: fluxbase_app_password
          FLUXBASE_DATABASE_ADMIN_USER: postgres
          FLUXBASE_DATABASE_ADMIN_PASSWORD: postgres
          FLUXBASE_DATABASE_DATABASE: fluxbase_test
          SKIP_MIGRATIONS: "true"
        run: |
          if [ "${{ needs.changes.outputs.go-core }}" = "true" ] || \
             [ "${{ needs.changes.outputs.go-areas }}" = "all" ] || \
             [ -z "${{ needs.changes.outputs.go-areas }}" ]; then
            echo "Core package changed — running full test suite"
            go test -v -short -race -timeout=10m -coverprofile=coverage-unit.out -covermode=atomic $(go list ./... | grep -v '/test/e2e' | grep -v '/test$')
          else
            echo "Selective test — areas: ${{ needs.changes.outputs.go-areas }}"
            # Build package list from changed areas
            PKGS=""
            IFS=',' read -ra AREAS <<< "${{ needs.changes.outputs.go-areas }}"
            for area in "${AREAS[@]}"; do
              case "$area" in
                cmd)     PKGS="$PKGS ./cmd/..." ;;
                cli)     PKGS="$PKGS ./cli/..." ;;
                *)       PKGS="$PKGS ./internal/$area/..." ;;
              esac
            done

            # Always include API tests (integration verifier)
            PKGS="$PKGS ./internal/api/..."

            echo "Testing packages: $PKGS"
            go test -v -short -race -timeout=10m -coverprofile=coverage-unit.out -covermode=atomic $PKGS
          fi

      - name: Run e2e tests with coverage
        timeout-minutes: 15
        env:
          FLUXBASE_DATABASE_HOST: localhost
          FLUXBASE_DATABASE_PORT: 5432
          FLUXBASE_DATABASE_USER: fluxbase_app
          FLUXBASE_DATABASE_PASSWORD: fluxbase_app_password
          FLUXBASE_DATABASE_DATABASE: fluxbase_test
          FLUXBASE_EMAIL_SMTP_HOST: localhost
          FLUXBASE_EMAIL_SMTP_PORT: 1025
          FLUXBASE_STORAGE_S3_ENDPOINT: localhost:9000
          FLUXBASE_STORAGE_S3_ACCESS_KEY: minioadmin
          FLUXBASE_STORAGE_S3_SECRET_KEY: minioadmin
          FLUXBASE_STORAGE_S3_BUCKET: fluxbase-test
          FLUXBASE_SECURITY_SETUP_TOKEN: test-setup-token-e2e-ci
        run: |
          if [ "${{ needs.changes.outputs.go-core }}" = "true" ] || \
             [ "${{ needs.changes.outputs.go-areas }}" = "all" ] || \
             [ -z "${{ needs.changes.outputs.go-areas }}" ]; then
            echo "Core package changed — running all e2e tests"
            go test -tags=integration -v -race -parallel=1 -timeout=10m -coverprofile=coverage-e2e.out -covermode=atomic ./test/e2e/...
          else
            echo "Selective e2e — areas: ${{ needs.changes.outputs.go-areas }}"
            # Map changed areas to e2e test file prefixes
            PATTERNS=""
            IFS=',' read -ra AREAS <<< "${{ needs.changes.outputs.go-areas }}"
            for area in "${AREAS[@]}"; do
              case "$area" in
                auth)      PATTERNS="$PATTERNS auth_ two_factor_ oauth_" ;;
                storage)   PATTERNS="$PATTERNS storage_ rls_ debug_storage" ;;
                ai)        PATTERNS="$PATTERNS ai_" ;;
                api)       PATTERNS="$PATTERNS rest_ graphql_ rpc_ sql_editor" ;;
                branching) PATTERNS="$PATTERNS branching_" ;;
                tenantdb)  PATTERNS="$PATTERNS tenant_" ;;
                functions) PATTERNS="$PATTERNS functions_" ;;
                realtime)  PATTERNS="$PATTERNS realtime_" ;;
                ratelimit) PATTERNS="$PATTERNS ratelimit_" ;;
                webhook)   PATTERNS="$PATTERNS webhook_" ;;
                mcp)       PATTERNS="$PATTERNS mcp_" ;;
                jobs)      PATTERNS="$PATTERNS logging_" ;;
                *)         PATTERNS="$PATTERNS $area" ;;
              esac
            done

            # Find matching e2e test files
            E2E_PKGS=""
            for pattern in $PATTERNS; do
              matches=$(find test/e2e -name "${pattern}*_test.go" -exec dirname {} \; 2>/dev/null | sort -u)
              E2E_PKGS="$E2E_PKGS $matches"
            done

            # Always include setup + health + admin
            E2E_PKGS="./test/e2e $E2E_PKGS"

            if [ -z "$(echo $E2E_PKGS | tr -d ' ')" ] || [ "$E2E_PKGS" = "./test/e2e" ]; then
              echo "No specific e2e tests matched — running full suite"
              go test -tags=integration -v -race -parallel=1 -timeout=10m -coverprofile=coverage-e2e.out -covermode=atomic ./test/e2e/...
            else
              echo "Running e2e packages: $(echo $E2E_PKGS | xargs)"
              go test -tags=integration -v -race -parallel=1 -timeout=10m -coverprofile=coverage-e2e.out -covermode=atomic $(echo $E2E_PKGS | xargs)
            fi
          fi

      - name: Merge coverage reports
        run: |
          # Install gocovmerge to combine coverage profiles
          go install github.com/wadey/gocovmerge@latest
          # Merge unit and e2e coverage into combined report
          gocovmerge coverage-unit.out coverage-e2e.out > coverage.out
          # Generate HTML report from combined coverage
          go tool cover -html=coverage.out -o coverage.html

      - name: Check coverage thresholds
        continue-on-error: true
        run: |
          go install github.com/vladopajic/go-test-coverage/v2@latest
          # Check thresholds against combined (unit + e2e) coverage
          go-test-coverage --config=.testcoverage.yml

      # - name: Upload coverage to Codecov
      #   uses: codecov/codecov-action@v5
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}
      #     files: ./coverage.out
      #     flags: unittests
      #     name: go-codecov
      #     fail_ci_if_error: true
      #     verbose: true
      #     slug: nimbleflux/fluxbase

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage.html

  test-e2e-ui:
    name: Test E2E UI
    needs: changes
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.admin-ui == 'true' ||
      needs.changes.outputs.e2e-ui == 'true' ||
      needs.changes.outputs.go == 'true' ||
      needs.changes.outputs.ci-config == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: ghcr.io/nimbleflux/fluxbase-postgres:${{ inputs.postgres_tag || '18' }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fluxbase_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      mailhog:
        image: mailhog/mailhog:latest
        ports:
          - 1025:1025
          - 8025:8025

      minio:
        image: minio/minio:edge-cicd
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
        options: >-
          --health-cmd "curl --silent --fail http://localhost:9000/minio/health/live || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips-dev libtesseract-dev libleptonica-dev

      - name: Get dependencies
        run: |
          go mod download
          go mod verify

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.14.1"

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.11

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Build SDK
        working-directory: ./sdk
        run: bun run build

      - name: Generate embedded SDK for Jobs runtime
        working-directory: ./sdk
        run: bun run generate:embedded-sdk

      - name: Build SDK React
        working-directory: ./sdk-react
        run: bun run build

      - name: Build Admin UI
        working-directory: ./admin
        run: bun run build

      - name: Copy Admin UI to embedded dist
        run: |
          rm -rf internal/adminui/dist
          cp -r admin/dist internal/adminui/dist

      - name: Increase PostgreSQL max_connections
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d fluxbase_test -c "ALTER SYSTEM SET max_connections = 200;"
          PG_CONTAINER=$(docker ps --format '{{.ID}}' --filter "publish=5432")
          if [ -n "$PG_CONTAINER" ]; then
            docker restart "$PG_CONTAINER"
            sleep 5
            for i in $(seq 1 30); do
              if psql -h localhost -U postgres -d fluxbase_test -c "SELECT 1" > /dev/null 2>&1; then
                echo "PostgreSQL ready with max_connections=200"
                break
              fi
              sleep 1
            done
          fi

      - name: Setup database users
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d fluxbase_test -c "CREATE USER fluxbase_app WITH PASSWORD 'fluxbase_app_password' LOGIN BYPASSRLS CREATEDB CREATEROLE;"
          psql -h localhost -U postgres -d fluxbase_test -c "GRANT ALL PRIVILEGES ON DATABASE fluxbase_test TO fluxbase_app;"
          psql -h localhost -U postgres -d fluxbase_test -c "GRANT ALL ON SCHEMA public TO fluxbase_app;"
          psql -h localhost -U postgres -d fluxbase_test -c "CREATE SCHEMA IF NOT EXISTS _fluxbase;"
          psql -h localhost -U postgres -d fluxbase_test -c "GRANT ALL ON SCHEMA _fluxbase TO fluxbase_app;"
          psql -h localhost -U postgres -d fluxbase_test -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Setup database schema
        env:
          PGPASSWORD: postgres
        run: |
          sed "s/{{APP_USER}}/fluxbase_app/g" internal/database/bootstrap/bootstrap.sql | psql -h localhost -U postgres -d fluxbase_test -v ON_ERROR_STOP=1
          psql -h localhost -U postgres -d fluxbase_test -c "GRANT anon, authenticated, service_role, tenant_service TO fluxbase_app;"
          psql -h localhost -U postgres -d fluxbase_test -c "GRANT ALL ON DATABASE fluxbase_test TO fluxbase_app;"
          psql -h localhost -U postgres -d fluxbase_test -c "GRANT ALL ON SCHEMA public TO fluxbase_app;"

      - name: Apply declarative schema
        env:
          PGPASSWORD: postgres
        run: |
          SCHEMA_DIR="internal/database/schema/schemas"
          for schema in platform auth storage jobs functions realtime ai rpc system migrations app api branching logging mcp; do
            echo "Applying schema: $schema"
            sed "s/{{APP_USER}}/fluxbase_app/g" "${SCHEMA_DIR}/${schema}.sql" | psql -h localhost -U postgres -d fluxbase_test -v ON_ERROR_STOP=1
          done
          psql -h localhost -U postgres -d fluxbase_test -v ON_ERROR_STOP=1 -f "${SCHEMA_DIR}/post-schema-fks.sql"
          psql -h localhost -U postgres -d fluxbase_test -v ON_ERROR_STOP=1 -f "${SCHEMA_DIR}/post-schema.sql"

      - name: Setup MinIO bucket
        run: |
          timeout 30 bash -c 'until curl -f http://localhost:9000/minio/health/live; do sleep 1; done'
          wget -q https://dl.min.io/client/mc/release/linux-amd64/mc
          chmod +x mc
          ./mc alias set minio http://localhost:9000 minioadmin minioadmin
          ./mc mb minio/fluxbase-test || true
          ./mc anonymous set public minio/fluxbase-test

      - name: Start Dex OIDC provider
        run: |
          docker run -d --name dex \
            -p 5556:5556 \
            -v "$(pwd)/test/e2e/dex-config-ci.yaml:/etc/dex/config.yaml:ro" \
            ghcr.io/dexidp/dex:latest \
            dex serve /etc/dex/config.yaml
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5556/dex/healthz > /dev/null 2>&1; then
              echo "Dex is ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Dex failed to start"
              docker logs dex
              exit 1
            fi
            sleep 1
          done

      - name: Reset database for fresh Playwright setup
        env:
          PGPASSWORD: postgres
        run: |
          # Drop all non-system schemas so the server bootstraps fresh
          # (no admin user → Playwright setup tests see /setup page)
          psql -h localhost -U postgres -d fluxbase_test -c \
            "DO \$\$ DECLARE r RECORD; BEGIN FOR r IN SELECT nspname FROM pg_namespace WHERE nspname NOT IN ('pg_catalog', 'information_schema', 'pg_toast') LOOP EXECUTE 'DROP SCHEMA IF EXISTS ' || quote_ident(r.nspname) || ' CASCADE'; END LOOP; END \$\$;"
          psql -h localhost -U postgres -d fluxbase_test -c \
            "CREATE SCHEMA IF NOT EXISTS public; GRANT ALL ON SCHEMA public TO public;"
          psql -h localhost -U postgres -d fluxbase_test -c \
            "ALTER USER fluxbase_app WITH BYPASSRLS;" 2>/dev/null || true

      - name: Build and start Go backend
        env:
          FLUXBASE_DATABASE_HOST: localhost
          FLUXBASE_DATABASE_PORT: 5432
          FLUXBASE_DATABASE_USER: fluxbase_app
          FLUXBASE_DATABASE_PASSWORD: fluxbase_app_password
          FLUXBASE_DATABASE_ADMIN_USER: postgres
          FLUXBASE_DATABASE_ADMIN_PASSWORD: postgres
          FLUXBASE_DATABASE_DATABASE: fluxbase_test
          FLUXBASE_SERVER_ADDRESS: ":8082"
          FLUXBASE_BASE_URL: "http://localhost:8082"
          FLUXBASE_ADMIN_ENABLED: "true"
          FLUXBASE_AUTH_JWT_SECRET: Kx9vM2nR7pQ4wT8yB3fJ6hL0zA5cD1eG
          FLUXBASE_ENCRYPTION_KEY: "a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6"
          FLUXBASE_SECURITY_SETUP_TOKEN: test-setup-token-e2e-ci-32chars-please
          FLUXBASE_EMAIL_SMTP_HOST: localhost
          FLUXBASE_EMAIL_SMTP_PORT: "1025"
          FLUXBASE_STORAGE_S3_ENDPOINT: localhost:9000
          FLUXBASE_STORAGE_S3_ACCESS_KEY: minioadmin
          FLUXBASE_STORAGE_S3_SECRET_KEY: minioadmin
          FLUXBASE_STORAGE_S3_BUCKET: fluxbase-test

          FLUXBASE_FUNCTIONS_ENABLED: "true"
          FLUXBASE_JOBS_ENABLED: "true"
          FLUXBASE_REALTIME_ENABLED: "true"
          FLUXBASE_AI_ENABLED: "true"
          FLUXBASE_RPC_ENABLED: "true"
          FLUXBASE_STORAGE_ENABLED: "true"
        run: |
          # Build the binary with embedded admin UI
          go build -o /tmp/fluxbase-e2e-ui cmd/fluxbase/main.go

          # Start in background
          GOGC=50 /tmp/fluxbase-e2e-ui >> /tmp/fluxbase-e2e-ui.log 2>&1 &
          echo $! > /tmp/fluxbase-e2e-ui.pid

          # Wait for the server to be ready (health check + bootstrap complete)
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8082/health > /dev/null 2>&1; then
              # Health is up — now wait for setup status API to confirm bootstrap is done
              SETUP_STATUS=$(curl -sf http://localhost:8082/api/v1/admin/setup/status 2>/dev/null || echo "")
              if echo "$SETUP_STATUS" | grep -q '"needs_setup"'; then
                echo "Go backend ready on :8082 (bootstrap complete)"
                break
              fi
              echo "Health OK, waiting for bootstrap to finish..."
            fi
            if [ "$i" -eq 60 ]; then
              echo "Backend failed to start within 120s"
              cat /tmp/fluxbase-e2e-ui.log
              exit 1
            fi
            sleep 2
          done

      - name: Install Playwright browsers
        working-directory: ./admin
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        working-directory: ./admin
        env:
          CI: "true"
          PLAYWRIGHT_BASE_URL: http://localhost:8082/admin/
          PLAYWRIGHT_API_URL: http://localhost:8082
          PLAYWRIGHT_BACKEND_PORT: "8082"
          PLAYWRIGHT_DATABASE_NAME: fluxbase_test
          FLUXBASE_SECURITY_SETUP_TOKEN: test-setup-token-e2e-ci-32chars-please
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: admin/playwright-report/
          retention-days: 7

      - name: Upload server logs
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: e2e-ui-server-logs
          path: /tmp/fluxbase-e2e-ui.log
          retention-days: 7

  build:
    name: Build
    needs: [changes, lint-go, lint-typescript, test-sdk, test-go, test-e2e-ui]
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.code-any == 'true' ||
      needs.changes.outputs.ci-config == 'true'
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.14.1"

      - name: Install dependencies (workspace)
        run: bun install --frozen-lockfile

      - name: Build SDK
        working-directory: ./sdk
        run: bun run build

      - name: Generate embedded SDK for Jobs runtime
        working-directory: ./sdk
        run: bun run generate:embedded-sdk

      - name: Build SDK React
        working-directory: ./sdk-react
        run: bun run build

      - name: Build Admin UI
        working-directory: ./admin
        run: bun run build

      - name: Copy Admin UI to internal/adminui/dist
        run: |
          mkdir -p internal/adminui/dist
          cp -r admin/dist/* internal/adminui/dist/

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips-dev libtesseract-dev libleptonica-dev

      - name: Build server binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          output_name="fluxbase-server-${{ matrix.goos }}-${{ matrix.goarch }}"
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          go build -ldflags="-s -w -X main.Version=dev-${GITHUB_SHA::8} -X main.Commit=${GITHUB_SHA} -X main.BuildDate=${BUILD_DATE}" -o "dist/${output_name}" cmd/fluxbase/main.go

      - name: Build CLI binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          output_name="fluxbase-${{ matrix.goos }}-${{ matrix.goarch }}"
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          go build -ldflags="-s -w -X github.com/nimbleflux/fluxbase/cli/cmd.Version=dev-${GITHUB_SHA::8} -X github.com/nimbleflux/fluxbase/cli/cmd.Commit=${GITHUB_SHA} -X github.com/nimbleflux/fluxbase/cli/cmd.BuildDate=${BUILD_DATE}" -o "dist/${output_name}" cli/main.go

      - name: Upload server artifacts
        uses: actions/upload-artifact@v7
        with:
          name: fluxbase-server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/fluxbase-server-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v7
        with:
          name: fluxbase-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/fluxbase-${{ matrix.goos }}-${{ matrix.goarch }}

  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [changes, test-go]
    if: >-
      github.event_name == 'push' &&
      (needs.changes.outputs.docker == 'true' ||
       needs.changes.outputs.go == 'true' ||
       needs.changes.outputs.ci-config == 'true')
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (test only, no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ghcr.io/${{ github.repository }}:test

  docker-docs:
    name: Docker Docs Build Test
    runs-on: ubuntu-latest
    needs: [changes, test-sdk]
    if: >-
      github.event_name == 'push' &&
      (needs.changes.outputs.docker == 'true' ||
       needs.changes.outputs.sdk == 'true' ||
       needs.changes.outputs.ci-config == 'true')
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.14.1"

      - name: Install dependencies (workspace)
        run: bun install --frozen-lockfile

      - name: Build SDK
        working-directory: ./sdk
        run: bun run build

      - name: Build SDK React
        working-directory: ./sdk-react
        run: bun run build

      - name: Build docs site
        working-directory: ./docs
        run: bun run build

      - name: Check for broken links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config .lychee.toml --root-dir ${{ github.workspace }}/docs/dist docs/dist
          fail: true

      - name: Verify build output
        run: |
          # Astro outputs to dist/
          test -f ./docs/dist/index.html || exit 1
          echo "Build output verified: ./docs/dist/index.html exists"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build docs Docker image (test only, no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.docs
          platforms: linux/amd64
          push: false
          cache-from: type=gha,key=docs-
          cache-to: type=gha,mode=max,key=docs-
          tags: ghcr.io/${{ github.repository }}-docs:test
