# go-test-coverage configuration
# See: https://github.com/vladopajic/go-test-coverage

profile: coverage.out

threshold:
  file: 0       # Individual files (not enforced yet)
  package: 0    # Per-package minimum (enforced via overrides below)
  total: 25     # Overall project target

# Override rules for specific patterns (evaluated in order, most specific first)
override:
  # Well-tested packages - enforce minimum coverage to prevent regression
  - path: ^internal/crypto/
    threshold: 75
  - path: ^internal/logging/
    threshold: 70
  - path: ^internal/observability/
    threshold: 50
  - path: ^internal/ratelimit/
    threshold: 50
  - path: ^internal/storage/
    threshold: 45
  - path: ^internal/email/
    threshold: 40
  - path: ^internal/config/
    threshold: 40
  - path: ^internal/realtime/
    threshold: 35
  - path: ^internal/rpc/
    threshold: 35
  - path: ^internal/runtime/
    threshold: 35
  - path: ^internal/middleware/
    threshold: 30
  - path: ^internal/auth/
    threshold: 25
  - path: ^internal/webhook/
    threshold: 25
  - path: ^internal/ai/
    threshold: 20
  - path: ^internal/functions/
    threshold: 20
  - path: ^internal/mcp/
    threshold: 20
  - path: ^internal/api/
    threshold: 15
  - path: ^internal/pubsub/
    threshold: 15
  - path: ^internal/jobs/
    threshold: 15
  - path: ^internal/branching/
    threshold: 25
  - path: ^internal/database/
    threshold: 1
  - path: ^internal/settings/
    threshold: 1
  - path: ^internal/secrets/
    threshold: 1
  - path: ^internal/extensions/
    threshold: 1

  # Test utilities don't need coverage themselves
  - path: ^internal/testutil
    threshold: 0

  # CLI utility packages - enforce minimum coverage
  - path: ^cli/client/
    threshold: 30
  - path: ^cli/config/
    threshold: 30
  - path: ^cli/output/
    threshold: 40
  - path: ^cli/util/
    threshold: 50

# Exclude patterns (regex) - remove from coverage calculation entirely
exclude:
  paths:
    # Pure type definitions without business logic
    - ^internal/query/types\.go$
    - ^internal/branching/types\.go$
    - ^internal/jobs/types\.go$
    - ^internal/rpc/types\.go$
    - ^internal/mcp/types\.go$
    - ^internal/runtime/types\.go$
    - ^internal/extensions/models\.go$
    - ^internal/storage/log_types\.go$
    - ^internal/api/rest_errors\.go$
    - ^internal/api/graphql_types\.go$
    - ^internal/branching/errors\.go$
    - ^internal/database/errors\.go$

    # Interface definitions
    - ^internal/auth/interfaces\.go$

    # Large generated specification files
    - ^internal/api/openapi\.go$

    # Infrastructure code (requires system dependencies, tested via E2E)
    - ^internal/scaling/leader\.go$
    - ^internal/database/connection\.go$
    - ^internal/ai/ocr_tesseract\.go$

    # Entry points and embedded assets
    - ^cmd/fluxbase/main\.go$
    - ^internal/adminui/

    # CLI commands (tested via mock server tests)
    - ^cli/cmd/

    # CLI entry point
    - ^cli/main\.go$

    # Test utilities
    - ^internal/testutil/
