version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - errorlint
    - govet
    # - staticcheck  # Temporarily disabled due to golangci-lint v2.10.0 panic with external packages (fasthttp, css_parser)
    - unused
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - (io.Closer).Close
        - (*database/sql.Rows).Close
        - (*database/sql/DB).Close
        - os.Setenv
        - os.Unsetenv
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
        - fmt.Print
        - fmt.Printf
        - fmt.Println
        - fmt.Scanf
        - fmt.Scanln
        - fmt.Scan
    errorlint:
      errorf: true
      comparison: false
      asserts: false
      errorf-multi: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - govet
      - path: cli/
        linters:
          - errcheck

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    gofumpt:
      extra-rules: false
    goimports:
      local-prefixes:
        - github.com/nimbleflux/fluxbase

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
